<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'MeiTuan';
    src: url('/fonts/Meituan Type-Regular.TTF') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  @font-face {
    font-family: 'FZLanTingHei';
    src: url('/fonts/FZLTHJW.TTF') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  @font-face {
    font-family: 'FZLanTingZCH';
    src: url('/fonts/FZLTZCHJW.TTF') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .banner {
    position: relative;
    width: 702px;
    height: 100px;
    border-radius: 20px;
    overflow: hidden;
    background-color: #fce4e4;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .product-image {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    height: calc(100% - 20px);
    width: auto;
    max-width: 140px;
    object-fit: contain;
    object-position: left center;
    z-index: 1;
  }

  .title-group {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    max-width: 420px;
    z-index: 2;
  }

  .main-title {
    color: #ea483f;
    font-family: 'MeiTuan', sans-serif;
    font-size: 36px;
    font-weight: normal;
    letter-spacing: -1.5px;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sub-title {
    color: #ea483f;
    font-family: 'FZLanTingHei', sans-serif;
    font-size: 22px;
    font-weight: normal;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 8px;
  }

  .btn {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    width: 133px;
    height: 48px;
    padding: 0;
    color: #ea483f;
    background: transparent;
    border: 2px solid #ea483f;
    border-radius: 24px;
    font-family: 'FZLanTingZCH', 'FZLanTingHei', sans-serif;
    font-size: 24px;
    line-height: 44px;
    text-align: center;
    white-space: nowrap;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="banner" id="banner">
    <img class="product-image" id="productImage" src="" alt="" />
    <div class="title-group">
      <div class="main-title" id="mainTitle">北京外卖餐饮消费券</div>
      <div class="sub-title" id="subTitle">最高得90元消费券</div>
    </div>
    <div class="btn" id="btn">立即抢</div>
  </div>

<script>
  var banner = document.getElementById('banner');
  var mainTitleEl = document.getElementById('mainTitle');
  var subTitleEl = document.getElementById('subTitle');
  var btnEl = document.getElementById('btn');
  var imgEl = document.getElementById('productImage');

  function applyParams(params) {
    var mainTitle = params.get('mainTitle');
    var subTitle = params.get('subTitle');
    var btnText = params.get('btnText');
    var bgImage = params.get('bgImage');
    var bgTemplate = params.get('bgTemplate');
    var fontColor = params.get('fontColor');

    if (mainTitle) mainTitleEl.textContent = mainTitle;
    if (subTitle) subTitleEl.textContent = subTitle;
    if (btnText) btnEl.textContent = btnText;

    if (fontColor) {
      mainTitleEl.style.color = fontColor;
      subTitleEl.style.color = fontColor;
      btnEl.style.color = fontColor;
      btnEl.style.borderColor = fontColor;
    }

    if (bgTemplate) {
      banner.style.backgroundImage = 'url(' + bgTemplate + ')';
      banner.style.backgroundColor = 'transparent';
    }

    if (bgImage) {
      imgEl.src = bgImage;
      imgEl.style.display = 'block';
      imgEl.onerror = function() { this.style.display = 'none'; };
    } else if (!imgEl.src || imgEl.src === window.location.href) {
      imgEl.style.display = 'none';
    }
  }

  applyParams(new URLSearchParams(window.location.search));

  window.addEventListener('message', function(e) {
    if (!e.data || e.data.type !== 'mtds:update') return;
    applyParams(new URLSearchParams(e.data.search || ''));
  });
</script>
</body>
</html>
